<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="{% include 'madoc/logo64.html' %}">
  <style>
    {% include css_style %}

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #main {
      height: 100vh;
    }

    .bb-entry {
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      font-size: 1rem;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
      padding-right: 12px;
    }

    .bb-icon {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid #b7b7b7;
      background: white;
    }

    .bb-label {
      display: inline-block;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bb-main {
      height: 100vh;
      max-width: none;
      border: 0;
      border-radius: 0;
      margin: 0;
      background: white;
      overflow: hidden;
    }

    .bb-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }

    .bb-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #6a737d;
      font-size: 1.1rem;
      padding: 20px;
      text-align: center;
    }

    @media only screen and (max-width: 700px) {
      .bb-main {
        height: 100vh;
        margin: 0;
      }

      .bb-label {
        max-width: 230px;
      }
    }
  </style>
</head>

<body>
  <script>
    const BURGER_BASE_LEFT = 10
    const BURGER_SLOT_WIDTH = 56
    const MENU_WIDTH = "400px"
    let showMenu = true
    let screenIsSmall = false
    let lastDisplayed = 1
    let inheritedBurgerSlots = 0

    function readInheritedBurgerSlots() {
      const match = /^madoc-burger-slots-(\d+)$/.exec(window.name || "")
      if (!match) {
        return 0
      }
      return parseInt(match[1], 10) || 0
    }

    function placeBurgerButton() {
      const burger = document.querySelector(".openButton")
      if (!burger) {
        return
      }
      burger.style.left = `${BURGER_BASE_LEFT + (inheritedBurgerSlots * BURGER_SLOT_WIDTH)}px`
    }

    function ownCollapsedSlots() {
      return showMenu ? 0 : 1
    }

    function currentChildSlots() {
      return inheritedBurgerSlots + ownCollapsedSlots()
    }

    function applyMenuLayout() {
      if (showMenu) {
        document.getElementById("sideNav").style.width = MENU_WIDTH;
        document.getElementById("main").style.marginLeft = MENU_WIDTH;
      } else {
        document.getElementById("sideNav").style.width = "0";
        document.getElementById("main").style.marginLeft = "0";
      }
    }

    function syncFrameBurgerContext() {
      const frame = document.getElementById("bb-frame")
      if (!frame) {
        return
      }
      const slots = currentChildSlots()
      frame.name = `madoc-burger-slots-${slots}`
      try {
        frame.contentWindow?.postMessage({ type: "madoc-burger-slots", slots }, "*")
      } catch (error) {
        // Cross-origin frames may ignore direct messaging; window.name still applies on load.
      }
    }

    function updateInheritedBurgerSlots(slotCount) {
      inheritedBurgerSlots = Math.max(0, slotCount)
      placeBurgerButton()
      syncFrameBurgerContext()
    }

    function isScreenSmall() {
      if (window.screen.width < 700) {
        screenIsSmall = true
      } else {
        screenIsSmall = false
      }
    }

    addEventListener("resize", (event) => {});
    onresize = (event) => { isScreenSmall() };

    window.addEventListener("message", (event) => {
      const payload = event.data
      if (!payload || payload.type !== "madoc-burger-slots") {
        return
      }
      if (typeof payload.slots !== "number") {
        return
      }
      updateInheritedBurgerSlots(payload.slots)
    })

    function switchMenu() {
      showMenu = !showMenu
      applyMenuLayout()
      syncFrameBurgerContext()
    }

    function display(index) {
      let selectedButton = document.getElementById(`button-${index}`)
      if (!selectedButton) {
        return
      }

      let allButtons = document.getElementsByClassName("button")
      for (var i = 0; i < allButtons.length; i++) {
        allButtons[i].classList.remove("button-selected")
      }
      selectedButton.classList.add("button-selected")

      const frame = document.getElementById("bb-frame")
      frame.name = `madoc-burger-slots-${currentChildSlots()}`
      frame.onload = () => {
        syncFrameBurgerContext()
      }
      frame.src = selectedButton.dataset.src
      lastDisplayed = index

      if (screenIsSmall) {
        showMenu = false
        applyMenuLayout()
        syncFrameBurgerContext()
      }
    }
  </script>

  <div id="sideNav" class="sidenav">
    <h2 id="tempTitle" class="menu-item">{{ title }}</h2>
    <div id="menuItems" class="menu-item">
      {% for item in items %}
      <button class="button menu-item bb-entry" id="button-{{ loop.index }}" data-src="{{ item.page_url }}" onclick="display({{ loop.index }})">
        {% if item.icon_url %}
        <img class="bb-icon" src="{{ item.icon_url }}" alt="icon">
        {% endif %}
        <span class="bb-label" title="{{ item.title }}">{{ item.title }}</span>
      </button>
      {% endfor %}
      <div class="menuWedge"></div>
    </div>
  </div>

  <span class="openButton" onclick="switchMenu()">&#9776;</span>

  <div id="main">
    <div class="bb-main">
      {% if items %}
      <iframe id="bb-frame" class="bb-frame" title="Bookbinding content"></iframe>
      {% else %}
      <div class="bb-placeholder">No pages provided.</div>
      {% endif %}
    </div>
  </div>

  <script>
    updateInheritedBurgerSlots(readInheritedBurgerSlots())
    isScreenSmall()
    if (screenIsSmall) {
      showMenu = false
    }
    applyMenuLayout()
    display(1)
  </script>

</body>

</html>
